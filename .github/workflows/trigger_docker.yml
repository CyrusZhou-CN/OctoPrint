name: Trigger docker build
on:
  release:
    types:
      - released
      - prereleased
  push:
    branches:
      - dev

jobs:
  dispatch_releases:
    runs-on: ubuntu-latest
    if: github.repository == 'OctoPrint/OctoPrint' && github.event_name != 'push'
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9

      - name: 🚀 Repository Dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.DOCKER_ACCESS_TOKEN }}
          repository: ${{ github.repository_owner }}/octoprint-docker
          event-type: ${{ github.event.action }}
          client-payload: '{"tag_name": "${{ github.event.release.tag_name }}"}'

  dispatch_canary:
    runs-on: ubuntu-latest
    if: github.repository == 'OctoPrint/OctoPrint' && github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9

      - name: 🚀 Repository Dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.DOCKER_ACCESS_TOKEN }}
          repository: ${{ github.repository_owner }}/octoprint-docker
          event-type: "canary"
          client-payload: '{"tag_name": "maintenance"}'
